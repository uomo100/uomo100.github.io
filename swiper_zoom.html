<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiper + PhotoSwipe Pro</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  background: transparent;
}

.swiper {
  width: 100%;
  max-height: 100vh;
  transition: height 0.6s cubic-bezier(0.65, 0, 0.35, 1);
}

.swiper-wrapper {
  align-items: center;
}

.swiper-slide {
  display: flex;
  justify-content: center;
  align-items: center;
}

.swiper-slide a {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}

.swiper-slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

  /* =========================
   COLORI GLOBALI
========================= */

:root {
  --main-red: #e30613;
  --white: #ffffff;
}

/* =========================
   BULLET
========================= */

.swiper-pagination-bullet {
  width: 10px;
  height: 10px;
  background: rgba(227, 6, 19, 0.3);
  opacity: 1;
  transition: all 0.3s cubic-bezier(0.65, 0, 0.35, 1);
}

.swiper-pagination-bullet-active {
  background: var(--main-red);
  transform: scale(1.3);
}

/* =========================
   FRECCE CUSTOM
========================= */

/* Nascondo icone default */
.swiper-button-next::after,
.swiper-button-prev::after {
  display: none;
}

/* Base frecce */
.swiper-button-next,
.swiper-button-prev {
  width: 48px;
  height: 48px;
  background-color: var(--main-red);
  border-radius: 50%;
  background-repeat: no-repeat;
  background-position: center;
  background-size: 22px;
  transition: transform 0.2s ease;
}

/* Hover leggero */
.swiper-button-next:hover,
.swiper-button-prev:hover {
  transform: scale(1.1);
}

/* Freccia DESTRA */
.swiper-button-next {
  background-image: url("data:image/svg+xml;utf8,\
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>\
  <path d='M8 5l8 7-8 7' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/>\
  </svg>");
}

/* Freccia SINISTRA */
.swiper-button-prev {
  background-image: url("data:image/svg+xml;utf8,\
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'>\
  <path d='M16 5l-8 7 8 7' fill='none' stroke='white' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'/>\
  </svg>");
}
</style>
</head>
<body>

<div class="swiper">
  <div class="swiper-wrapper">

    <div class="swiper-slide">
      <a href="images/img1.jpg" data-pswp-width="1440" data-pswp-height="1440">
        <img src="images/img1.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img2.jpg" data-pswp-width="675" data-pswp-height="675">
        <img src="images/img2.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img3.jpg" data-pswp-width="1440" data-pswp-height="1800">
        <img src="images/img3.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img4.jpg" data-pswp-width="1440" data-pswp-height="1800">
        <img src="images/img4.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img5.jpg" data-pswp-width="1280" data-pswp-height="1600">
        <img src="images/img5.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img6.jpg" data-pswp-width="1280" data-pswp-height="1600">
        <img src="images/img6.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img7.jpg" data-pswp-width="1024" data-pswp-height="819">
        <img src="images/img7.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img8.jpg" data-pswp-width="960" data-pswp-height="437">
        <img src="images/img8.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img9.jpg" data-pswp-width="1024" data-pswp-height="1280">
        <img src="images/img9.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img10.jpg" data-pswp-width="1024" data-pswp-height="1280">
        <img src="images/img10.jpg">
      </a>
    </div>

  </div>

  <div class="swiper-pagination"></div>
  <div class="swiper-button-next"></div>
  <div class="swiper-button-prev"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

<script type="module">
import PhotoSwipeLightbox from 
'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.js';

/* ---------- SWIPER ---------- */

const swiper = new Swiper('.swiper', {
  loop: true,
  speed: 700,
  pagination: { el: '.swiper-pagination', clickable: true },
  navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
  autoplay: { delay: 2500, disableOnInteraction: false },
});

/* ---------- HEIGHT ENGINE ---------- */

function getHeightFromSlide(slide) {
  const link = slide?.querySelector('a');
  if (!link) return swiper.height;

  const w = parseInt(link.dataset.pswpWidth);
  const h = parseInt(link.dataset.pswpHeight);
  if (!w || !h) return swiper.height;

  let height = swiper.width * (h / w);
  return Math.min(height, window.innerHeight);
}

function setHeight(value) {
  swiper.el.style.height = value + 'px';
}

/* ---------- TRANSIZIONE PULITA ---------- */

swiper.on('init', () => {
  const firstSlide = swiper.slides[swiper.activeIndex];
  setHeight(getHeightFromSlide(firstSlide));
});

swiper.on('slideChangeTransitionStart', () => {
  const prevSlide = swiper.slides[swiper.previousIndex];
  const nextSlide = swiper.slides[swiper.activeIndex];

  const h1 = getHeightFromSlide(prevSlide);
  const h2 = getHeightFromSlide(nextSlide);

  // stato iniziale reale
  setHeight(h1);

  // transizione verso nuovo stato (frame successivo)
  requestAnimationFrame(() => {
    setHeight(h2);
  });
});

swiper.on('slideChangeTransitionEnd', () => {
  const activeSlide = swiper.slides[swiper.activeIndex];
  setHeight(getHeightFromSlide(activeSlide));
});

window.addEventListener('resize', () => {
  const activeSlide = swiper.slides[swiper.activeIndex];
  setHeight(getHeightFromSlide(activeSlide));
});

/* ---------- PHOTOSWIPE ---------- */

const lightbox = new PhotoSwipeLightbox({
  gallery: '.swiper',
  children: 'a',
  pswpModule: () => import(
    'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.js'
  ),
  wheelToZoom: true,
  pinchToClose: true
});

lightbox.init();
</script>

</body>
</html>
