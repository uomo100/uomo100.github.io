<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiper + PhotoSwipe</title>

  <!-- Swiper CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"
  />

  <!-- PhotoSwipe CSS -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css"
  />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      height: 100vh;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .swiper {
      width: 100%;
      height: 80vh;
      background: transparent;
    }

    .swiper-wrapper {
      height: 100%;
    }

    .swiper-slide {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .swiper-slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- Swiper -->
  <div class="swiper">
    <div class="swiper-wrapper">

      <!-- IMPORTANTE: data-pswp-width e height -->
      <div class="swiper-slide">
        <a href="images/img1.jpg" data-pswp-width="1440" data-pswp-height="1440">
          <img src="images/img1.jpg" alt="img1">
        </a>
      </div>

      <div class="swiper-slide">
        <a href="images/img2.jpg" data-pswp-width="675" data-pswp-height="675">
          <img src="images/img2.jpg" alt="img2">
        </a>
      </div>

      <div class="swiper-slide">
        <a href="images/img3.jpg" data-pswp-width="1440" data-pswp-height="1800">
          <img src="images/img3.jpg" alt="img3">
        </a>
      </div>

      <div class="swiper-slide">
        <a href="images/img4.jpg" data-pswp-width="1440" data-pswp-height="1800">
          <img src="images/img4.jpg" alt="img4">
        </a>
      </div>

      <div class="swiper-slide">
        <a href="images/img5.jpg" data-pswp-width="1280" data-pswp-height="1600">
          <img src="images/img5.jpg" alt="img5">
        </a>
      </div>

      <div class="swiper-slide">
        <a href="images/img6.jpg" data-pswp-width="1280" data-pswp-height="1600">
          <img src="images/img6.jpg" alt="img6">
        </a>
      </div>

       <div class="swiper-slide">
        <a href="images/img7.jpg" data-pswp-width="1024" data-pswp-height="819">
          <img src="images/img7.jpg" alt="img7">
        </a>
      </div>

       <div class="swiper-slide">
        <a href="images/img8.jpg" data-pswp-width="960" data-pswp-height="437">
          <img src="images/img8.jpg" alt="img8">
        </a>
      </div>

       <div class="swiper-slide">
        <a href="images/img9.jpg" data-pswp-width="1024" data-pswp-height="1280">
          <img src="images/img9.jpg" alt="img9">
        </a>
      </div>

      <div class="swiper-slide">
        <a href="images/img10.jpg" data-pswp-width="1024" data-pswp-height="1280">
          <img src="images/img10.jpg" alt="img10">
        </a>
      </div>

      


      <!-- continua per le altre immagini -->

    </div>

    <div class="swiper-pagination"></div>
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
  </div>

  <!-- Swiper JS -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

  <!-- PhotoSwipe JS (ES module) -->
  <script type="module">
    import PhotoSwipeLightbox from 'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.js';

    const swiper = new Swiper('.swiper', {
      loop: true,
      pagination: { el: '.swiper-pagination', clickable: true },
      navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
      autoplay: { delay: 2500, disableOnInteraction: false },
    });

    const lightbox = new PhotoSwipeLightbox({
      gallery: '.swiper',
      children: 'a',
      pswpModule: () => import('https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.js'),
      wheelToZoom: true,      // ✅ zoom con rotella
      pinchToClose: true,
      clickToCloseNonZoomable: true
    });

    lightbox.init();
  </script>

</body>
</html>
