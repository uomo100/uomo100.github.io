<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Swiper + PhotoSwipe Pro</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"/>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.css"/>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  height: 100%;
  background: transparent;
}

.swiper {
  width: 100%;
  max-height: 100vh;
  transition: height 0.6s cubic-bezier(0.65, 0, 0.35, 1);
}

.swiper-wrapper {
  align-items: center;
}

.swiper-slide {
  display: flex;
  justify-content: center;
  align-items: center;
}

.swiper-slide a {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 100%;
  height: 100%;
}

.swiper-slide img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}
</style>
</head>
<body>

<div class="swiper">
  <div class="swiper-wrapper">

    <!-- SLIDES -->
    <div class="swiper-slide">
      <a href="images/img1.jpg" data-pswp-width="1440" data-pswp-height="1440">
        <img src="images/img1.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img2.jpg" data-pswp-width="675" data-pswp-height="675">
        <img src="images/img2.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img3.jpg" data-pswp-width="1440" data-pswp-height="1800">
        <img src="images/img3.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img4.jpg" data-pswp-width="1440" data-pswp-height="1800">
        <img src="images/img4.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img5.jpg" data-pswp-width="1280" data-pswp-height="1600">
        <img src="images/img5.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img6.jpg" data-pswp-width="1280" data-pswp-height="1600">
        <img src="images/img6.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img7.jpg" data-pswp-width="1024" data-pswp-height="819">
        <img src="images/img7.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img8.jpg" data-pswp-width="960" data-pswp-height="437">
        <img src="images/img8.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img9.jpg" data-pswp-width="1024" data-pswp-height="1280">
        <img src="images/img9.jpg">
      </a>
    </div>

    <div class="swiper-slide">
      <a href="images/img10.jpg" data-pswp-width="1024" data-pswp-height="1280">
        <img src="images/img10.jpg">
      </a>
    </div>

  </div>

  <div class="swiper-pagination"></div>
  <div class="swiper-button-next"></div>
  <div class="swiper-button-prev"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

<script type="module">
import PhotoSwipeLightbox from 
'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe-lightbox.esm.js';

const EASING = [0.65, 0.0, 0.35, 1.0];

/* -------- CUBIC BEZIER SOLVER -------- */

function cubicBezier(p1x, p1y, p2x, p2y) {
  return function (t) {
    const cx = 3 * p1x;
    const bx = 3 * (p2x - p1x) - cx;
    const ax = 1 - cx - bx;

    const cy = 3 * p1y;
    const by = 3 * (p2y - p1y) - cy;
    const ay = 1 - cy - by;

    function sampleCurveX(t) {
      return ((ax * t + bx) * t + cx) * t;
    }

    function sampleCurveY(t) {
      return ((ay * t + by) * t + cy) * t;
    }

    function sampleCurveDerivativeX(t) {
      return (3 * ax * t + 2 * bx) * t + cx;
    }

    function solveCurveX(x) {
      let t2 = x;
      for (let i = 0; i < 8; i++) {
        const x2 = sampleCurveX(t2) - x;
        if (Math.abs(x2) < 1e-6) return t2;
        const d2 = sampleCurveDerivativeX(t2);
        if (Math.abs(d2) < 1e-6) break;
        t2 = t2 - x2 / d2;
      }
      return t2;
    }

    return sampleCurveY(solveCurveX(t));
  };
}

const ease = cubicBezier(...EASING);

/* -------- SWIPER -------- */

const swiper = new Swiper('.swiper', {
  loop: true,
  speed: 700,
  pagination: { el: '.swiper-pagination', clickable: true },
  navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
  autoplay: { delay: 2500, disableOnInteraction: false },
});

/* -------- HEIGHT ENGINE -------- */

function getHeightFromSlide(slide) {
  const link = slide?.querySelector('a');
  if (!link) return swiper.height;

  const w = parseInt(link.dataset.pswpWidth);
  const h = parseInt(link.dataset.pswpHeight);

  if (!w || !h) return swiper.height;

  const ratio = h / w;
  let newHeight = swiper.width * ratio;

  if (newHeight > window.innerHeight)
    newHeight = window.innerHeight;

  return newHeight;
}

function updateHeightInstant() {
  const activeSlide = swiper.slides[swiper.activeIndex];
  swiper.el.style.height =
    getHeightFromSlide(activeSlide) + 'px';
}

function updateHeightSmooth() {
  const activeIndex = swiper.activeIndex;
  const activeSlide = swiper.slides[activeIndex];

  let nextIndex =
    swiper.swipeDirection === 'next'
      ? activeIndex + 1
      : activeIndex - 1;

  if (nextIndex < 0)
    nextIndex = swiper.slides.length - 1;

  if (nextIndex >= swiper.slides.length)
    nextIndex = 0;

  const nextSlide = swiper.slides[nextIndex];

  const h1 = getHeightFromSlide(activeSlide);
  const h2 = getHeightFromSlide(nextSlide);

  const rawProgress =
    Math.abs(swiper.progress * (swiper.slides.length - 1) - activeIndex);

  const easedProgress = ease(rawProgress);

  const interpolated =
    h1 + (h2 - h1) * easedProgress;

  swiper.el.style.height = interpolated + 'px';
}

/* -------- ADAPTIVE SPEED -------- */

swiper.on('slideChangeTransitionStart', () => {
  const current = swiper.slides[swiper.previousIndex];
  const next = swiper.slides[swiper.activeIndex];

  const h1 = getHeightFromSlide(current);
  const h2 = getHeightFromSlide(next);

  const delta = Math.abs(h2 - h1);

  const base = 400;
  const factor = 0.25;

  swiper.params.speed = base + delta * factor;
});

swiper.on('setTranslate', updateHeightSmooth);
swiper.on('slideChangeTransitionEnd', updateHeightInstant);
window.addEventListener('resize', updateHeightInstant);
window.addEventListener('load', updateHeightInstant);

/* -------- PHOTOSWIPE -------- */

const lightbox = new PhotoSwipeLightbox({
  gallery: '.swiper',
  children: 'a',
  pswpModule: () => import(
    'https://cdn.jsdelivr.net/npm/photoswipe@5/dist/photoswipe.esm.js'
  ),
  wheelToZoom: true,
  pinchToClose: true
});

lightbox.init();
</script>

</body>
</html>
