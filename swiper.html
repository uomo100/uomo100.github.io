<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swiper Demo</title>

  <!-- Link CSS di Swiper -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css"
  />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .swiper {
  width: 100%;
  max-width: 800px;
  aspect-ratio: 16 / 9;
  background: transparent;
}

.swiper-wrapper {
  height: 100%;
}

.swiper-slide {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
}

.swiper-slide img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block; 
}
  </style>
</head>
<body>

  <!-- Swiper container -->
  <div class="swiper">
    <div class="swiper-wrapper">
      <div class="swiper-slide"><img src="images/img1.jpg" alt="img1"></div>
      <div class="swiper-slide"><img src="images/img2.jpg" alt="img2"></div>
      <div class="swiper-slide"><img src="images/img3.jpg" alt="img3"></div>
      <div class="swiper-slide"><img src="images/img4.jpg" alt="img4"></div>
      <div class="swiper-slide"><img src="images/img5.jpg" alt="img5"></div>
      <div class="swiper-slide"><img src="images/img6.jpg" alt="img6"></div>
      <div class="swiper-slide"><img src="images/img7.jpg" alt="img7"></div>
      <div class="swiper-slide"><img src="images/img8.jpg" alt="img8"></div>
      <div class="swiper-slide"><img src="images/img9.jpg" alt="img9"></div>
      <div class="swiper-slide"><img src="images/img10.jpg" alt="img10"></div>
    </div>
    <!-- Pagine / bullets -->
    <div class="swiper-pagination"></div>

    <!-- Frecce -->
    <div class="swiper-button-next"></div>
    <div class="swiper-button-prev"></div>
  </div>

  <!-- Script JS di Swiper -->
  <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>

  <script>
    const swiper = new Swiper('.swiper', {
      loop: true,               // Ciclo infinito
      pagination: {
        el: '.swiper-pagination',
        clickable: true,       // Pagine cliccabili
      },
      navigation: {
        nextEl: '.swiper-button-next',
        prevEl: '.swiper-button-prev',
      },
      autoplay: {
        delay: 2500,           // Cambio automatico ogni 2,5s
        disableOnInteraction: false,
      },
    });
  </script>

</body>
</html>
